name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rls-audit:
    name: RLS Policy Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: RLS policy audit (PR check — no migration)
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" -f scripts/rls-audit/audit.sql

      - name: RLS audit (deploy)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" -f scripts/rls-audit/audit.sql

  deploy-portal:
    name: Deploy Portal
    runs-on: ubuntu-latest
    needs: rls-audit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install dependencies
        working-directory: apps/portal
        run: npm ci

      - name: Build portal
        working-directory: apps/portal
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXUSBRIDGE_PORTAL_KEY: ${{ secrets.NEXUSBRIDGE_PORTAL_KEY }}
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PORTAL }}
          working-directory: apps/portal
          vercel-args: '--prod'

  deploy-marketing:
    name: Deploy Marketing Site
    runs-on: ubuntu-latest
    needs: rls-audit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-marketing/package-lock.json

      - name: Install dependencies
        working-directory: apps/web-marketing
        run: npm ci

      - name: Build marketing site
        working-directory: apps/web-marketing
        env:
          RESEND_API_KEY: ${{ secrets.WEB_MKT_RESEND_API_KEY }}
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_MARKETING }}
          working-directory: apps/web-marketing
          vercel-args: '--prod'
